name: Deploy Silvera to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 GitHub Pages'e Deploy Et
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Kodu İndir
        uses: actions/checkout@v4

      - name: ⚙️ GitHub Pages'i Ayarla
        uses: actions/configure-pages@v5

      - name: 📦 Dosyaları Paketle
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🌐 Deploy Et
        id: deployment
        uses: actions/deploy-pages@v4
